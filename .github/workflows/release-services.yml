name: Release Services

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true
        default: "services-v0.1.0"
  push:
    tags:
      - "services-v*"

permissions:
  contents: write

jobs:
  mock-service:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build solution
        run: dotnet build MyApp.sln --configuration Release

      - name: Build mock service package
        shell: pwsh
        run: ./tools/package-mock-service.ps1 -Configuration Release

      - name: Write package hash
        id: package
        shell: pwsh
        run: |
          $package = "artifacts/mock-service-0.1.0-win-x64.svcpkg"
          $hash = (Get-FileHash -Algorithm SHA256 $package).Hash.ToLowerInvariant()
          $size = (Get-Item $package).Length
          "sha256=$hash" | Out-File -FilePath artifacts/mock-service-0.1.0-win-x64.sha256 -Encoding ascii
          "size=$size" | Out-File -FilePath artifacts/mock-service-0.1.0-win-x64.size -Encoding ascii
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          "size=$size" >> $env:GITHUB_OUTPUT
          Write-Host "sha256=$hash"
          Write-Host "size=$size"

      - name: Generate release catalog
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
          PACKAGE_SHA256: ${{ steps.package.outputs.sha256 }}
          PACKAGE_SIZE: ${{ steps.package.outputs.size }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $catalogPath = "catalog/services.stable.json"
          $packageName = "mock-service-0.1.0-win-x64.svcpkg"
          $catalog = Get-Content -Raw $catalogPath | ConvertFrom-Json -Depth 20
          $mock = $catalog.services | Where-Object { $_.id -eq "mock-service" } | Select-Object -First 1
          $mock.package.url = "https://github.com/$env:REPOSITORY/releases/download/$env:RELEASE_TAG/$packageName"
          $mock.package.sha256 = $env:PACKAGE_SHA256
          $mock.package.size = [int64]$env:PACKAGE_SIZE
          $catalog.updatedAt = (Get-Date).ToUniversalTime().ToString("o")
          $catalog.signature.algorithm = "dev-placeholder"
          $catalog.signature.keyId = "exapp-dev-2026"
          $catalog.signature.value = "unsigned-dev-catalog"
          $catalog | ConvertTo-Json -Depth 20 | Set-Content -Encoding UTF8 "artifacts/services.stable.json"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            artifacts/mock-service-0.1.0-win-x64.svcpkg
            artifacts/mock-service-0.1.0-win-x64.sha256
            artifacts/mock-service-0.1.0-win-x64.size
            artifacts/services.stable.json
            schemas/service-catalog.schema.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
