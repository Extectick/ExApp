name: Release Services

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true
        default: "services-v0.1.0"
  push:
    tags:
      - "services-v*"

permissions:
  contents: write

jobs:
  services:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build and test service platform
        shell: pwsh
        run: |
          dotnet build src/ExApp.Agent/ExApp.Agent.csproj --configuration Release
          dotnet build services/MockService/ExApp.Service.MockService.csproj --configuration Release
          dotnet build services/VpnClient/ExApp.Service.VpnClient.csproj --configuration Release
          dotnet test tests/ExApp.Packaging.Tests/ExApp.Packaging.Tests.csproj --configuration Release
          dotnet test tests/ExApp.Ipc.Tests/ExApp.Ipc.Tests.csproj --configuration Release

      - name: Build mock service package
        shell: pwsh
        run: ./tools/package-mock-service.ps1 -Configuration Release

      - name: Generate release catalog
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          ./tools/generate-service-catalog.ps1 `
            -ReleaseTag $env:RELEASE_TAG `
            -Repository $env:REPOSITORY

      - name: Validate release assets
        shell: pwsh
        run: |
          $catalog = Get-Content -Raw "artifacts/services.stable.json" | ConvertFrom-Json -Depth 20
          $available = @($catalog.services | Where-Object { $_.status -eq "available" })
          if ($available.Count -eq 0) {
            throw "The release catalog has no available services."
          }

          foreach ($service in $available) {
            if ([string]::IsNullOrWhiteSpace($service.package.url) -or
                [string]::IsNullOrWhiteSpace($service.package.sha256) -or
                $service.package.size -le 0) {
              throw "Service '$($service.id)' has incomplete package metadata."
            }
          }

          foreach ($service in $available) {
            $packageName = [IO.Path]::GetFileName(([uri]$service.package.url).AbsolutePath)
            $package = Join-Path "artifacts" $packageName
            $expectedHash = (Get-Content "$package.sha256" -Raw).Trim()
            $actualHash = (Get-FileHash -Algorithm SHA256 $package).Hash.ToLowerInvariant()
            if ($actualHash -ne $expectedHash -or $actualHash -ne $service.package.sha256) {
              throw "Generated package '$packageName' does not match catalog metadata."
            }
          }

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            artifacts/*.svcpkg
            artifacts/*.svcpkg.sha256
            artifacts/*.svcpkg.size
            artifacts/services.stable.json
            schemas/service-catalog.schema.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
