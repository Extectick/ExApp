name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ExApp.sln

      - name: Build
        shell: pwsh
        run: |
          dotnet build src/ExApp.Desktop/ExApp.Desktop.csproj --configuration Debug -p:Platform=x64
          dotnet build src/ExApp.Agent/ExApp.Agent.csproj --configuration Debug --no-restore
          dotnet build services/MockService/ExApp.Service.MockService.csproj --configuration Debug --no-restore
          dotnet build services/VpnClient/ExApp.Service.VpnClient.csproj --configuration Debug --no-restore
          dotnet build tests/ExApp.Packaging.Tests/ExApp.Packaging.Tests.csproj --configuration Debug --no-restore
          dotnet build tests/ExApp.Ipc.Tests/ExApp.Ipc.Tests.csproj --configuration Debug --no-restore

      - name: Test
        shell: pwsh
        run: |
          dotnet test tests/ExApp.Packaging.Tests/ExApp.Packaging.Tests.csproj --configuration Debug --no-build
          dotnet test tests/ExApp.Ipc.Tests/ExApp.Ipc.Tests.csproj --configuration Debug --no-build

      - name: App update e2e smoke
        shell: pwsh
        run: ./tools/test-app-update-e2e.ps1 -Configuration Debug -BaseVersion 0.1.900 -TargetVersion 0.1.901
