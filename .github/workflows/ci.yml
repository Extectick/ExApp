name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ExApp.sln

      - name: Build
        run: dotnet build ExApp.sln --configuration Debug --no-restore

      - name: Test
        run: dotnet test ExApp.sln --configuration Debug --no-build
